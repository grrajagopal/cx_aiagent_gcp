steps:
  # Step 1: Build the production container image using your explicit project ID
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/cxlens-grr/agent-apps-repo/cx-supervisor:latest', 
      '.'
    ]

  # Step 2: Push the compiled image into your verified Artifact Registry repository
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/cxlens-grr/agent-apps-repo/cx-supervisor:latest'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
